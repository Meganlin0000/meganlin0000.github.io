<style>
  *{margin:0;box-sizing:border-box}

  h1 .r{color:#c5362a}
  p{color:#6d685d;font-size:1.05rem;margin-bottom:28px}
  a{display:inline-flex;align-items:center;gap:.6em;font-weight:700;
    background:#1c1a15;color:#f3f0e8;padding:14px 26px;border-radius:2px;text-decoration:none;transition:background .2s}
  a:hover{background:#c5362a}
  a .d{width:8px;height:8px;border-radius:50%;background:#c5362a}
</style>
</head>
